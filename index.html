<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AOU GPA Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 15px; min-height: 100vh; }
.wrap { width: 100%; max-width: 680px; }
.section-card {
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 14px;
  padding: 1.2rem;
  margin-bottom: 1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: #888;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { position: relative; }
.field label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }

.field input, .field select {
  width: 100%;
  font-size: 16px; /* منع الزووم التلقائي في الايفون */
  padding: 12px; /* تكبير منطقة اللمس */
  border: 1px solid #ccc;
  border-radius: 10px;
  outline: none;
  background: white;
  color: #111;
  transition: border-color 0.15s;
}

.module-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1.2fr 45px; /* كبرت مكان زرار الحذف */
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
}

.del-btn {
  background: #fff5f5;
  border: 1px solid #ffcdd2;
  border-radius: 10px;
  width: 44px; /* حجم مثالي للموبايل */
  height: 44px;
  cursor: pointer;
  font-size: 22px;
  color: #e53935;
  display: flex;
  align-items: center;
  justify-content: center;
}

.add-btn {
  background: #f8f9fa;
  border: 2px dashed #ddd;
  border-radius: 12px;
  width: 100%;
  padding: 15px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: #666;
  margin-top: 10px;
}

.calc-btn {
  width: 100%;
  padding: 16px;
  background: #1a1a1a;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

/* تحسين الجداول للموبايل */
@media (max-width: 480px) {
  .col-headers { font-size: 10px; }
  .module-row { grid-template-columns: 1.5fr 1fr 1.2fr 40px; }
  .gpa-big { font-size: 40px; }
}

.error-msg { font-size: 10px; color: #e53935; font-weight: 500; margin-top: 3px; height: 0; overflow: hidden; transition: height 0.2s; }
.error-msg.show { height: 14px; }
.shake { animation: shake 0.3s ease; border-color: #e53935 !important; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

.results-card { background: white; border: 1px solid #e0e0e0; border-radius: 14px; padding: 1.3rem; margin-top: 1rem; display: none; }
.res-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
.res-table th { color: #999; text-align: left; padding: 8px 4px; border-bottom: 1px solid #eee; }
.res-table td { padding: 10px 4px; border-bottom: 1px solid #f0f0f0; }
</style>
</head>
<body>
<div class="wrap">

  <div class="section-card">
    <div class="section-title">Previous semester (Optional)</div>
    <div class="grid-2">
      <div class="field">
        <label>Total points</label>
        <input type="number" id="old-p" oninput="clamp(this, 535, 'err-p', 'Max 535')">
        <div class="error-msg" id="err-p"></div>
      </div>
      <div class="field">
        <label>Total hours</label>
        <input type="number" id="old-h" oninput="clamp(this, 132, 'err-h', 'Max 132')">
        <div class="error-msg" id="err-h"></div>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title">Modules</div>
    <div id="modules-list"></div>
    <button class="add-btn" onclick="addModule()">+ Add New Module</button>
  </div>

  <button class="calc-btn" onclick="calculate()">Calculate GPA</button>
  <button style="width:100%; background:none; border:none; color:#999; margin-top:15px; font-size:12px;" onclick="resetAll()">Reset all data</button>

  <div class="results-card" id="res-card">
    <div style="text-align:center; margin-bottom:20px;">
        <div style="font-size:14px; color:#888;">Your GPA is</div>
        <div class="gpa-big" id="res-gpa">0.00</div>
    </div>
    <table class="res-table">
      <thead><tr><th>Module</th><th>Score</th><th>Grade</th><th>Hrs</th></tr></thead>
      <tbody id="res-tbody"></tbody>
    </table>
    <div id="res-meta" style="margin-top:15px; font-size:13px; color:#666;"></div>
    <div id="res-cumulative" style="margin-top:15px; padding-top:15px; border-top:2px solid #f0f2f5; display:none;">
        <div style="font-size:12px; color:#888;">Cumulative CGPA</div>
        <div style="font-size:24px; font-weight:700;" id="cum-gpa-val">0.00</div>
    </div>
  </div>

</div>

<script>
let moduleCount = 0;
let modules = [];

function clamp(input, max, errId, msg) {
  const v = parseFloat(input.value);
  const errEl = document.getElementById(errId);
  if (v > max) {
    input.value = max;
    input.classList.add('shake');
    errEl.textContent = msg;
    errEl.classList.add('show');
    setTimeout(() => { input.classList.remove('shake'); errEl.classList.remove('show'); }, 2000);
  }
}

function addModule() {
  const id = moduleCount++;
  modules.push(id);
  const row = document.createElement('div');
  row.className = 'module-row';
  row.id = 'row-' + id;
  row.innerHTML = `
    <input type="text" id="mn-${id}" placeholder="Name (Opt)">
    <input type="number" id="ms-${id}" placeholder="Score" oninput="if(value>100)value=100">
    <select id="mh-${id}">
      <option value="3">3H</option>
      <option value="4">4H</option>
      <option value="5">5H</option>
      <option value="8">8H</option>
    </select>
    <button class="del-btn" onclick="removeModule(${id})">×</button>
  `;
  document.getElementById('modules-list').appendChild(row);
}

function removeModule(id) {
  modules = modules.filter(m => m !== id);
  document.getElementById('row-' + id).remove();
}

function getGrade(s) {
  if (s >= 90) return { pts: 4.0, label: "A" };
  if (s >= 82) return { pts: 3.5, label: "B+" };
  if (s >= 74) return { pts: 3.0, label: "B" };
  if (s >= 66) return { pts: 2.5, label: "C+" };
  if (s >= 58) return { pts: 2.0, label: "C" };
  if (s >= 50) return { pts: 1.5, label: "D" };
  return { pts: 0.0, label: "F" };
}

function calculate() {
  let semPts = 0, semHrs = 0, rows = '', hasData = false;
  modules.forEach((id, index) => {
    const sVal = document.getElementById('ms-' + id).value;
    if (sVal === '') return;
    const s = parseFloat(sVal);
    const h = parseFloat(document.getElementById('mh-' + id).value);
    const name = document.getElementById('mn-' + id).value || ('Module ' + (index + 1));
    const g = getGrade(s);
    semPts += (g.pts * h);
    semHrs += h;
    hasData = true;
    rows += `<tr><td>${name}</td><td>${s}</td><td><b>${g.label}</b></td><td>${h}</td></tr>`;
  });

  if (!hasData) return alert('Enter at least one score');

  const semGpa = semPts / semHrs;
  document.getElementById('res-gpa').textContent = semGpa.toFixed(2);
  document.getElementById('res-tbody').innerHTML = rows;
  document.getElementById('res-card').style.display = 'block';

  const oldP = parseFloat(document.getElementById('old-p').value) || 0;
  const oldH = parseFloat(document.getElementById('old-h').value) || 0;
  if (oldH > 0) {
    const cumGpa = (oldP + semPts) / (oldH + semHrs);
    document.getElementById('res-cumulative').style.display = 'block';
    document.getElementById('cum-gpa-val').textContent = cumGpa.toFixed(2);
  }
}

function resetAll() {
  document.getElementById('modules-list').innerHTML = '';
  modules = [];
  for(let i=0; i<4; i++) addModule();
  document.getElementById('res-card').style.display = 'none';
}

// Initial modules
for(let i=0; i<4; i++) addModule();
</script>
</body>
</html>
